schema_version: 1

context:
  name: pyometiff
  version: 1.1.4
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pyometiff-${{ version }}.tar.gz
  sha256: 4d2f354c971caad5b46f2ce603fccf6265d5c88f15f2d8df6e87c2118ca53869
  patches:
    - require.patch

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - poetry-core
  run:
    - python >=${{ python_min }}
    - lxml >=5.3.2,<6.0.0
    - tifffile >2020.10.1
    - numpy >=1.26.4
    - imagecodecs >=2024.12.30

tests:
  - python:
      imports:
        - pyometiff
      pip_check: true

      python_version: ${{ python_min }}.*
about:
  summary: Read and Write OME-TIFFs in Python
  license: GPL-3.0-or-later
  license_file: LICENSE
  homepage: https://github.com/filippocastelli/pyometiff

extra:
  recipe-maintainers:
    - jan-janssen
